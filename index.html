<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>AR Pénz Megjelenítő</title>
  </head>
  <body>
    <div id="ui-container">
      <div id="ui-content" class="p-4 bg-white/90 backdrop-blur-md rounded-b-2xl shadow-lg border-b border-gray-200">
        <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">AR Pénz Megjelenítő</h1>
        
        <div class="mb-4">
          <label for="amount" class="block text-sm font-medium text-gray-700 mb-1">Mennyiség (HUF)</label>
          <input 
            type="number" 
            id="amount" 
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 text-lg font-semibold"
            placeholder="Pl. 1000000"
          >
        </div>

        <div class="flex flex-wrap gap-2 mb-4 justify-center">
          <button class="preset-btn bg-emerald-100 hover:bg-emerald-200 text-emerald-800 text-xs font-semibold py-1 px-2 rounded" data-val="1000000">1 Millió</button>
          <button class="preset-btn bg-emerald-100 hover:bg-emerald-200 text-emerald-800 text-xs font-semibold py-1 px-2 rounded" data-val="100000000">100 Millió</button>
          <button class="preset-btn bg-emerald-100 hover:bg-emerald-200 text-emerald-800 text-xs font-semibold py-1 px-2 rounded" data-val="1000000000">1 Milliárd</button>
          <button class="preset-btn bg-emerald-100 hover:bg-emerald-200 text-emerald-800 text-xs font-semibold py-1 px-2 rounded" data-val="100000000000">100 Milliárd</button>
          <button class="preset-btn bg-emerald-100 hover:bg-emerald-200 text-emerald-800 text-xs font-semibold py-1 px-2 rounded" data-val="1000000000000">1000 Milliárd</button>
        </div>

        <div id="result-panel" class="bg-gray-100 p-3 rounded-md text-sm text-gray-700 mb-4 hidden">
          <!-- Text math result will go here -->
        </div>

        <div id="ar-button-container" class="flex justify-center mt-2">
          <!-- Three.js ARButton will be injected here -->
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
